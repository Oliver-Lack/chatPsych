version: "3"

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost.d:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html

  letsencrypt:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-letsencrypt
    depends_on:
      - nginx-proxy
    environment:
      - DEFAULT_EMAIL=youremail@example.com
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost.d:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html

  app:
    build: .
    env_file: .env
    environment:
      - VIRTUAL_HOST=chatpsych-playground.org        # CHANGE THIS for your domain
      - LETSENCRYPT_HOST=chatpsych-playground.org    # CHANGE THIS for your domain
      - LETSENCRYPT_EMAIL=youremail@example.com      # CHANGE this to your email
    expose:
      - "8000"
    volumes:
      - data:/app/data

volumes:
  data: